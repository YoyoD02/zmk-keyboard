manifest:
  defaults:
    revision: v0.3
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    # Additional modules containing boards/shields/custom code can be listed here as well
    # See https://docs.zephyrproject.org/3.2.0/develop/west/manifest.html#projects

    - name: zmk-keyboard   # 替换为你的GitHub用户名
      url-base: https://github.com/YoyoD02/zmk-keyboard.git

  projects:
    - name: zmk
      remote: zmkfirmware
      import: app/west.yml



    - name: zmk-vfx-keypress       # 你的新灯效模块名称
      remote: zmk-keyboard
      revision: main


  self:
    path: config

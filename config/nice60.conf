

# Name
CONFIG_ZMK_KEYBOARD_NAME="toutou!68-BT"
# Enable MPU
CONFIG_ARM_MPU=y
CONFIG_PINCTRL=y

# Enable GPIO
CONFIG_GPIO=y

CONFIG_USE_DT_CODE_PARTITION=y
CONFIG_BUILD_OUTPUT_UF2=y

CONFIG_MPU_ALLOW_FLASH_WRITE=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
# Enable RGB 启用RGB底灯系统（基础依赖）
CONFIG_ZMK_RGB_UNDERGLOW=y

CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=160
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3

CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# #Turn off RGB underglow when keyboard goes into idle state
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_SLEEP=y



# Toutou added in nice60 compared with toutou68
# 按键扫描优化
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

CONFIG_WS2812_STRIP=y
# Enable the Bluetooth BAS (battery reporting service)
CONFIG_BT_BAS=y

# Resolved connection interruption issue
CONFIG_CLOCK_CONTROL_NRF=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# Rnable idle
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
# CONFIG_SPI=y
# #nkro
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y 

# # #Low level setting for GATT subscriptions. Set to n to work around an annoying Windows bug with battery notifications
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# # bluetooth  Increasing the transmit power of the keyboard's BLE radio
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y


CONFIG_ZMK_RGB_UNDERGLOW_PER_KEY=y
CONFIG_ZMK_VFX_KEYPRESS=y

